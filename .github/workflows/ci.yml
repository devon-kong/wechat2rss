name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Compile check
        run: python -m py_compile w2r.py src/w2r/cli.py

      - name: Build artifacts
        run: python -m build

      - name: CLI smoke
        run: |
          w2r --help
          w2r accounts --help
          w2r config --help
          w2r service --help
          w2r subs --help
          w2r articles --help
          w2r feed --help
          w2r proxy --help
